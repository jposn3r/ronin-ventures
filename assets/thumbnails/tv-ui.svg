<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="tvBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0606"/>
      <stop offset="100%" stop-color="#050202"/>
    </linearGradient>
    <linearGradient id="tvHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e50914" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e50914" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#tvBg)"/>

  <!-- Hero banner -->
  <g transform="translate(60 50)">
    <rect x="0" y="0" width="680" height="150" rx="8" fill="url(#tvHero)" stroke="#e50914" stroke-opacity="0.35"/>
    <text x="30" y="50" fill="#e50914" font-family="monospace" font-size="24" font-weight="700" letter-spacing="3">FEATURED</text>
    <rect x="30" y="70" width="280" height="8" rx="3" fill="#ffffff" opacity="0.7"/>
    <rect x="30" y="86" width="200" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
    <rect x="30" y="110" width="90" height="26" rx="4" fill="#e50914"/>
    <text x="75" y="128" fill="#ffffff" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">▶ PLAY</text>
    <rect x="130" y="110" width="100" height="26" rx="4" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-opacity="0.4"/>
    <text x="180" y="128" fill="#ffffff" font-family="monospace" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1" opacity="0.9">+ MY LIST</text>
  </g>

  <!-- Content row -->
  <g transform="translate(60 220)">
    <text x="0" y="14" fill="#ffffff" font-family="monospace" font-size="12" font-weight="600" opacity="0.85" letter-spacing="2">TRENDING NOW</text>

    <!-- Tiles -->
    <g>
      <rect x="0"   y="30" width="120" height="130" rx="6" fill="#e50914" opacity="0.3"/>
      <rect x="0"   y="30" width="120" height="130" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.15"/>

      <rect x="135" y="30" width="120" height="130" rx="6" fill="#e50914" opacity="0.25"/>
      <rect x="135" y="30" width="120" height="130" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.15"/>

      <rect x="270" y="30" width="120" height="130" rx="6" fill="#e50914" opacity="0.35"/>
      <rect x="270" y="30" width="120" height="130" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.15"/>

      <rect x="405" y="30" width="120" height="130" rx="6" fill="#e50914" opacity="0.22"/>
      <rect x="405" y="30" width="120" height="130" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.15"/>

      <rect x="540" y="30" width="120" height="130" rx="6" fill="#e50914" opacity="0.3"/>
      <rect x="540" y="30" width="120" height="130" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.15"/>
    </g>

    <!-- Tile inner dressing: fake thumbnail bars -->
    <g fill="#ffffff" opacity="0.5">
      <rect x="10"  y="132" width="80" height="4" rx="2"/>
      <rect x="145" y="132" width="70" height="4" rx="2"/>
      <rect x="280" y="132" width="90" height="4" rx="2"/>
      <rect x="415" y="132" width="60" height="4" rx="2"/>
      <rect x="550" y="132" width="85" height="4" rx="2"/>
    </g>

    <!-- Focus ring: hops across tiles -->
    <rect x="0" y="30" width="120" height="130" rx="6" fill="none" stroke="#ffffff" stroke-width="3">
      <animate attributeName="x" values="0;135;270;405;540;0" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.6 0 0.4 1;0.6 0 0.4 1;0.6 0 0.4 1;0.6 0 0.4 1;0.6 0 0.4 1"/>
    </rect>
    <rect x="0" y="30" width="120" height="130" rx="6" fill="#ffffff" opacity="0.08">
      <animate attributeName="x" values="0;135;270;405;540;0" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.6 0 0.4 1;0.6 0 0.4 1;0.6 0 0.4 1;0.6 0 0.4 1;0.6 0 0.4 1"/>
    </rect>
  </g>

  <text x="400" y="420" fill="#e50914" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.5">TV UI</text>
</svg>
