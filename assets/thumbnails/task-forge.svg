<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="tfBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#tfBg)"/>

  <!-- Three kanban columns -->
  <g>
    <rect x="80"  y="70" width="200" height="300" rx="8" fill="#141414" stroke="#38bdf8" stroke-opacity="0.35"/>
    <rect x="300" y="70" width="200" height="300" rx="8" fill="#141414" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="520" y="70" width="200" height="300" rx="8" fill="#141414" stroke="#38bdf8" stroke-opacity="0.35"/>

    <g font-family="monospace" font-size="11" font-weight="600" fill="#38bdf8" letter-spacing="2" text-anchor="middle">
      <text x="180" y="94">TO DO</text>
      <text x="400" y="94">IN PROGRESS</text>
      <text x="620" y="94">DONE</text>
    </g>

    <g stroke="#38bdf8" stroke-opacity="0.3">
      <line x1="100" y1="104" x2="260" y2="104"/>
      <line x1="320" y1="104" x2="480" y2="104"/>
      <line x1="540" y1="104" x2="700" y2="104"/>
    </g>
  </g>

  <!-- Static cards -->
  <g>
    <!-- TODO column -->
    <rect x="100" y="120" width="160" height="48" rx="4" fill="#38bdf8" opacity="0.12" stroke="#38bdf8" stroke-opacity="0.4"/>
    <rect x="108" y="132" width="100" height="6" rx="2" fill="#38bdf8" opacity="0.7"/>
    <rect x="108" y="146" width="70" height="5" rx="2" fill="#38bdf8" opacity="0.4"/>
    <circle cx="246" cy="158" r="5" fill="#f97316" opacity="0.7"/>

    <rect x="100" y="184" width="160" height="48" rx="4" fill="#38bdf8" opacity="0.12" stroke="#38bdf8" stroke-opacity="0.4"/>
    <rect x="108" y="196" width="130" height="6" rx="2" fill="#38bdf8" opacity="0.7"/>
    <rect x="108" y="210" width="60" height="5" rx="2" fill="#38bdf8" opacity="0.4"/>
    <circle cx="246" cy="222" r="5" fill="#a78bfa" opacity="0.7"/>

    <!-- DONE column -->
    <rect x="540" y="120" width="160" height="48" rx="4" fill="#38bdf8" opacity="0.12" stroke="#38bdf8" stroke-opacity="0.4"/>
    <rect x="548" y="132" width="110" height="6" rx="2" fill="#38bdf8" opacity="0.5"/>
    <rect x="548" y="146" width="80" height="5" rx="2" fill="#38bdf8" opacity="0.3"/>
    <g stroke="#34d399" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="682,154 688,160 696,150"/>
    </g>

    <rect x="540" y="184" width="160" height="48" rx="4" fill="#38bdf8" opacity="0.12" stroke="#38bdf8" stroke-opacity="0.4"/>
    <rect x="548" y="196" width="140" height="6" rx="2" fill="#38bdf8" opacity="0.5"/>
    <rect x="548" y="210" width="60" height="5" rx="2" fill="#38bdf8" opacity="0.3"/>
    <g stroke="#34d399" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="682,218 688,224 696,214"/>
    </g>
  </g>

  <!-- Moving card: TODO -> IN PROGRESS -> DONE -->
  <g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="100,248;320,120;540,248;540,248"
        keyTimes="0;0.4;0.8;1"
        dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.6 0 0.4 1;0.6 0 0.4 1;0 0 1 1"/>
      <rect x="0" y="0" width="160" height="48" rx="4" fill="#38bdf8" opacity="0.25" stroke="#38bdf8" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.9;0.7;0.7" keyTimes="0;0.4;0.8;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <rect x="8"  y="12" width="120" height="6" rx="2" fill="#38bdf8" opacity="0.9"/>
      <rect x="8"  y="26" width="90"  height="5" rx="2" fill="#38bdf8" opacity="0.6"/>
      <circle cx="146" cy="38" r="5" fill="#34d399"/>
    </g>
  </g>

  <text x="400" y="420" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.4">TASK FORGE</text>
</svg>
