<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="mkGlow" cx="0.5" cy="0.55" r="0.5">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mkBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b18"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="mkBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#mkBg)"/>

  <!-- Starfield -->
  <g fill="#ffffff">
    <circle cx="80"  cy="60"  r="0.8" opacity="0.7"/>
    <circle cx="160" cy="120" r="1.2" opacity="0.8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="40"  r="0.7" opacity="0.6"/>
    <circle cx="330" cy="90"  r="1" opacity="0.8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="50"  r="0.6" opacity="0.5"/>
    <circle cx="520" cy="110" r="1.3" opacity="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="60"  r="0.7" opacity="0.7"/>
    <circle cx="680" cy="130" r="1" opacity="0.8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="730" cy="55"  r="0.5" opacity="0.5"/>

    <circle cx="60"  cy="200" r="0.7" opacity="0.5"/>
    <circle cx="120" cy="290" r="0.9" opacity="0.7"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="200" r="1.1" opacity="0.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="280" r="0.6" opacity="0.5"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="400" cy="260" r="220" fill="url(#mkGlow)"/>

  <!-- Orbit rings (tilted) -->
  <g transform="translate(400 260)">
    <ellipse rx="170" ry="46" fill="none" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="-12;-12" dur="1s"/>
    </ellipse>
    <ellipse rx="140" ry="38" fill="none" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1" transform="rotate(-12)"/>
    <ellipse rx="110" ry="30" fill="none" stroke="#818cf8" stroke-opacity="0.6" stroke-width="1" transform="rotate(-12)"/>

    <!-- Orbiting particle -->
    <g transform="rotate(-12)">
      <circle r="4" fill="#818cf8">
        <animateMotion path="M 170 0 A 170 46 0 1 1 -170 0 A 170 46 0 1 1 170 0" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle r="3" fill="#a78bfa">
        <animateMotion path="M 140 0 A 140 38 0 1 1 -140 0 A 140 38 0 1 1 140 0" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Avatar silhouette: head + shoulders -->
  <g transform="translate(400 260)">
    <!-- Shoulders / torso -->
    <path d="M -60,60 Q -60,10 -35,0 L 35,0 Q 60,10 60,60 Z" fill="url(#mkBody)"/>
    <!-- Neck -->
    <rect x="-10" y="-10" width="20" height="18" fill="#818cf8" opacity="0.6"/>
    <!-- Head -->
    <circle cy="-40" r="30" fill="none" stroke="#818cf8" stroke-width="2"/>
    <circle cy="-40" r="30" fill="#818cf8" opacity="0.15"/>
    <!-- Eye glow -->
    <g fill="#c4b5fd">
      <circle cx="-10" cy="-42" r="2.5">
        <animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="10" cy="-42" r="2.5">
        <animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Gentle floating -->
    <animateTransform attributeName="transform" type="translate" values="400,260;400,252;400,260" dur="4s" repeatCount="indefinite"/>
  </g>

  <text x="400" y="420" fill="#818cf8" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.4">METAKAIZEN</text>
</svg>
