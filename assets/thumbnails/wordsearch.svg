<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="wsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#wsBg)"/>

  <g transform="translate(205 45)" font-family="monospace" font-size="26" font-weight="600" fill="#34d399" text-anchor="middle">
    <!-- 8x8 letter grid; the hidden word "SEARCH" sits at row 3, cols 1-6 (diagonal-ish).
         Cell size 48. Grid center: 192,192. -->
    <g opacity="0.8">
      <!-- Row 0 -->
      <text x="24"  y="34">Q</text>
      <text x="72"  y="34">K</text>
      <text x="120" y="34">L</text>
      <text x="168" y="34">P</text>
      <text x="216" y="34">M</text>
      <text x="264" y="34">B</text>
      <text x="312" y="34">T</text>
      <text x="360" y="34">Y</text>
      <!-- Row 1 -->
      <text x="24"  y="82">R</text>
      <text x="72"  y="82">S</text>
      <text x="120" y="82">J</text>
      <text x="168" y="82">A</text>
      <text x="216" y="82">V</text>
      <text x="264" y="82">N</text>
      <text x="312" y="82">D</text>
      <text x="360" y="82">Z</text>
      <!-- Row 2 -->
      <text x="24"  y="130">B</text>
      <text x="72"  y="130">W</text>
      <text x="120" y="130">E</text>
      <text x="168" y="130">O</text>
      <text x="216" y="130">C</text>
      <text x="264" y="130">F</text>
      <text x="312" y="130">H</text>
      <text x="360" y="130">U</text>
      <!-- Row 3 (target word) -->
      <text x="24"  y="178">X</text>
      <text x="72"  y="178" font-weight="700">S</text>
      <text x="120" y="178" font-weight="700">E</text>
      <text x="168" y="178" font-weight="700">A</text>
      <text x="216" y="178" font-weight="700">R</text>
      <text x="264" y="178" font-weight="700">C</text>
      <text x="312" y="178" font-weight="700">H</text>
      <text x="360" y="178">G</text>
      <!-- Row 4 -->
      <text x="24"  y="226">I</text>
      <text x="72"  y="226">T</text>
      <text x="120" y="226">P</text>
      <text x="168" y="226">Q</text>
      <text x="216" y="226">M</text>
      <text x="264" y="226">L</text>
      <text x="312" y="226">K</text>
      <text x="360" y="226">V</text>
      <!-- Row 5 -->
      <text x="24"  y="274">F</text>
      <text x="72"  y="274">O</text>
      <text x="120" y="274">N</text>
      <text x="168" y="274">D</text>
      <text x="216" y="274">S</text>
      <text x="264" y="274">W</text>
      <text x="312" y="274">Y</text>
      <text x="360" y="274">E</text>
      <!-- Row 6 -->
      <text x="24"  y="322">R</text>
      <text x="72"  y="322">U</text>
      <text x="120" y="322">Z</text>
      <text x="168" y="322">J</text>
      <text x="216" y="322">P</text>
      <text x="264" y="322">C</text>
      <text x="312" y="322">B</text>
      <text x="360" y="322">T</text>
    </g>
  </g>

  <!-- Sweep highlight across "SEARCH" row -->
  <g transform="translate(205 45)">
    <rect x="52" y="148" width="0" height="40" rx="20" fill="#34d399" opacity="0">
      <animate attributeName="width" values="0;290;290;0" dur="4s" keyTimes="0;0.35;0.9;1" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="0;0.25;0.25;0" dur="4s" keyTimes="0;0.35;0.9;1" repeatCount="indefinite"/>
    </rect>
    <!-- Underline stroke -->
    <line x1="72" y1="168" x2="72" y2="168" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0">
      <animate attributeName="x2" values="72;312;312;72" dur="4s" keyTimes="0;0.35;0.9;1" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" keyTimes="0;0.35;0.9;1" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="400" y="420" fill="#34d399" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.4">WORD SEARCH</text>
</svg>
