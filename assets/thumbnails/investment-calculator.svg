<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="wapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="wapArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e6b8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00e6b8" stop-opacity="0"/>
    </linearGradient>

    <!-- Shared vertical-edge clip: leading edge stays a straight vertical line so the fill drops 90° from the stroke's tip. -->
    <clipPath id="wapClip">
      <rect x="0" y="0" width="0" height="450">
        <animate attributeName="width" values="0;700;700" keyTimes="0;0.9;1" dur="6s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.2 1;0 0 1 1"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="800" height="450" fill="url(#wapBg)"/>

  <g stroke="#00e6b8" stroke-opacity="0.08" stroke-width="1">
    <line x1="100" y1="80" x2="700" y2="80"/>
    <line x1="100" y1="160" x2="700" y2="160"/>
    <line x1="100" y1="240" x2="700" y2="240"/>
    <line x1="100" y1="320" x2="700" y2="320"/>
  </g>

  <g font-family="monospace" font-size="10" fill="#00e6b8" opacity="0.4">
    <text x="88" y="84" text-anchor="end">$1M</text>
    <text x="88" y="164" text-anchor="end">$750K</text>
    <text x="88" y="244" text-anchor="end">$500K</text>
    <text x="88" y="324" text-anchor="end">$250K</text>
  </g>

  <!-- Area + stroke share the same vertical clip so the fill's right edge drops straight down from the line's tip -->
  <g clip-path="url(#wapClip)">
    <path d="M 100,320 C 160,318 200,280 250,290 C 300,300 340,230 400,250 C 460,270 490,190 540,170 C 600,145 640,105 700,70 L 700,320 Z"
      fill="url(#wapArea)" stroke="none"/>
    <path d="M 100,320 C 160,318 200,280 250,290 C 300,300 340,230 400,250 C 460,270 490,190 540,170 C 600,145 640,105 700,70"
      fill="none" stroke="#00e6b8" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <g transform="translate(620 50)" opacity="0">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.85;0.92" dur="6s" repeatCount="indefinite"/>
    <rect x="-42" y="-20" width="84" height="28" rx="6" fill="#00e6b8" opacity="0.15" stroke="#00e6b8" stroke-opacity="0.6"/>
    <text x="0" y="0" fill="#00e6b8" font-family="monospace" font-size="13" font-weight="600" text-anchor="middle">+287%</text>
  </g>

  <text x="400" y="420" fill="#00e6b8" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.4">WEALTH ARCHITECT</text>
</svg>
