<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="cdBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1410"/>
      <stop offset="100%" stop-color="#050a08"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#cdBg)"/>

  <!-- Editor window -->
  <g transform="translate(130 50)">
    <rect x="0" y="0" width="540" height="320" rx="10" fill="#0d1a14" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1.5"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="540" height="36" rx="10" fill="#22c55e" opacity="0.08"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f56"/>
    <circle cx="40" cy="18" r="5" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="5" fill="#27c93f"/>
    <text x="270" y="22" fill="#22c55e" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.7">main.ts — cursor</text>

    <!-- Line numbers -->
    <g font-family="monospace" font-size="12" fill="#22c55e" opacity="0.35" text-anchor="end">
      <text x="36" y="72">1</text>
      <text x="36" y="96">2</text>
      <text x="36" y="120">3</text>
      <text x="36" y="144">4</text>
      <text x="36" y="168">5</text>
      <text x="36" y="192">6</text>
      <text x="36" y="216">7</text>
      <text x="36" y="240">8</text>
      <text x="36" y="264">9</text>
      <text x="36" y="288">10</text>
    </g>

    <!-- Code lines (static) -->
    <g font-family="monospace" font-size="13">
      <text x="56" y="72" fill="#a3e635">function</text>
      <text x="130" y="72" fill="#22c55e" opacity="0.9">build</text>
      <text x="180" y="72" fill="#22c55e" opacity="0.7">(</text>
      <text x="195" y="72" fill="#e0f2fe">input</text>
      <text x="234" y="72" fill="#22c55e" opacity="0.7">)</text>
      <text x="248" y="72" fill="#22c55e" opacity="0.7">{</text>

      <text x="80" y="96" fill="#a3e635">const</text>
      <text x="130" y="96" fill="#e0f2fe">result</text>
      <text x="190" y="96" fill="#22c55e" opacity="0.7">=</text>
      <text x="206" y="96" fill="#e0f2fe">parse</text>
      <text x="250" y="96" fill="#22c55e" opacity="0.7">(</text>
      <text x="262" y="96" fill="#e0f2fe">input</text>
      <text x="302" y="96" fill="#22c55e" opacity="0.7">)</text>

      <text x="80" y="120" fill="#a3e635">return</text>
      <text x="136" y="120" fill="#e0f2fe">result</text>

      <text x="56" y="144" fill="#22c55e" opacity="0.7">}</text>
    </g>

    <!-- Being-typed line 6 -->
    <g font-family="monospace" font-size="13">
      <text x="56" y="192" fill="#a3e635">
        <tspan opacity="0">//</tspan>
        <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.1;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <text x="78" y="192" fill="#64748b" opacity="0">
        ai: suggest
        <animate attributeName="opacity" values="0;0;0.7;0.7" keyTimes="0;0.12;0.25;1" dur="6s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Ghost AI suggestion on line 7 (typed progressively) -->
    <g font-family="monospace" font-size="13">
      <text x="80" y="216" fill="#22c55e" opacity="0">
        return input.toUpperCase()
        <animate attributeName="opacity" values="0;0;0.45;0.45;0.9;0.9" keyTimes="0;0.3;0.45;0.7;0.75;1" dur="6s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Cursor block -->
    <rect x="290" y="180" width="2" height="18" fill="#22c55e">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="x" values="56;100;196;290;290" keyTimes="0;0.1;0.25;0.45;1" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Tab-to-accept hint -->
    <g opacity="0">
      <rect x="140" y="240" width="100" height="24" rx="4" fill="#22c55e" opacity="0.2"/>
      <text x="190" y="256" fill="#22c55e" font-family="monospace" font-size="11" text-anchor="middle">TAB · accept</text>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.65;0.85;0.95" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>

  <text x="400" y="420" fill="#22c55e" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.4">CURSOR DEV</text>
</svg>
