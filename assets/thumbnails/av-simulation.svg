<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="avBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1218"/>
      <stop offset="100%" stop-color="#050a0e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#avBg)"/>

  <!-- Street grid (top-down intersection) -->
  <g>
    <!-- Horizontal roads -->
    <rect x="0"   y="140" width="800" height="60" fill="#111c26"/>
    <rect x="0"   y="260" width="800" height="60" fill="#111c26"/>
    <!-- Vertical roads -->
    <rect x="180" y="0"   width="60"  height="450" fill="#111c26"/>
    <rect x="540" y="0"   width="60"  height="450" fill="#111c26"/>

    <!-- Road dashed center lines -->
    <g stroke="#00ccff" stroke-width="2" stroke-dasharray="12 10" opacity="0.35">
      <line x1="0"   y1="170" x2="800" y2="170"/>
      <line x1="0"   y1="290" x2="800" y2="290"/>
      <line x1="210" y1="0"   x2="210" y2="450"/>
      <line x1="570" y1="0"   x2="570" y2="450"/>
    </g>

    <!-- Curbs -->
    <g stroke="#00ccff" stroke-opacity="0.2" stroke-width="1" fill="none">
      <line x1="0"   y1="140" x2="800" y2="140"/>
      <line x1="0"   y1="200" x2="800" y2="200"/>
      <line x1="0"   y1="260" x2="800" y2="260"/>
      <line x1="0"   y1="320" x2="800" y2="320"/>
      <line x1="180" y1="0"   x2="180" y2="450"/>
      <line x1="240" y1="0"   x2="240" y2="450"/>
      <line x1="540" y1="0"   x2="540" y2="450"/>
      <line x1="600" y1="0"   x2="600" y2="450"/>
    </g>
  </g>

  <!-- Building blocks (corners) -->
  <g fill="#00ccff" opacity="0.07">
    <rect x="30"  y="30"  width="130" height="90" rx="3"/>
    <rect x="260" y="30"  width="260" height="90" rx="3"/>
    <rect x="620" y="30"  width="160" height="90" rx="3"/>
    <rect x="30"  y="220" width="130" height="20" rx="3"/>
    <rect x="260" y="220" width="260" height="20" rx="3"/>
    <rect x="620" y="220" width="160" height="20" rx="3"/>
    <rect x="30"  y="340" width="130" height="90" rx="3"/>
    <rect x="260" y="340" width="260" height="90" rx="3"/>
    <rect x="620" y="340" width="160" height="90" rx="3"/>
  </g>

  <!-- Planned path: ego car route -->
  <path d="M 60,290 L 210,290 L 210,170 L 570,170 L 570,290 L 760,290" fill="none" stroke="#00ccff" stroke-width="2.5" stroke-dasharray="8 6" opacity="0.85">
    <animate attributeName="stroke-dashoffset" values="0;-28" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- NPC cars: strictly on opposite-direction lanes from ego.
       Ego travels at y=170 (top road centerline) and y=290 (bottom road centerline).
       NPCs placed at y=188 and y=308 — 18px offset, larger than car half-height. -->
  <g>
    <!-- Top road, opposite lane, right-to-left -->
    <rect y="180" width="26" height="16" rx="3" fill="#f97316" opacity="0.85">
      <animate attributeName="x" values="820;-40" dur="11s" repeatCount="indefinite"/>
    </rect>
    <!-- Bottom road, opposite lane, right-to-left -->
    <rect y="300" width="26" height="16" rx="3" fill="#a78bfa" opacity="0.85">
      <animate attributeName="x" values="820;-40" dur="13s" begin="-4s" repeatCount="indefinite"/>
    </rect>
    <!-- Bottom road, opposite lane, staggered -->
    <rect y="300" width="26" height="16" rx="3" fill="#34d399" opacity="0.75">
      <animate attributeName="x" values="820;-40" dur="13s" begin="-10s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Ego car (following planned path) -->
  <g>
    <rect x="-16" y="-10" width="32" height="20" rx="4" fill="#00ccff" stroke="#ffffff" stroke-width="1.2"/>
    <rect x="-12" y="-6" width="24" height="12" rx="2" fill="#ffffff" opacity="0.25"/>
    <animateMotion dur="8s" repeatCount="indefinite" rotate="auto"
      path="M 60,290 L 210,290 L 210,170 L 570,170 L 570,290 L 760,290"/>
  </g>

  <!-- Sensor cone -->
  <g opacity="0.35">
    <polygon points="0,-8 70,-35 70,35 0,8" fill="#00ccff">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="1.8s" repeatCount="indefinite"/>
    </polygon>
    <animateMotion dur="8s" repeatCount="indefinite" rotate="auto"
      path="M 60,290 L 210,290 L 210,170 L 570,170 L 570,290 L 760,290"/>
  </g>

  <text x="400" y="420" fill="#00ccff" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.5">AV PATH PLANNER</text>
</svg>
