<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="hostrBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <radialGradient id="hostrGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#hostrBg)"/>

  <!-- Candle glow -->
  <circle cx="400" cy="225" r="180" fill="url(#hostrGlow)"/>

  <!-- Table (top-down ellipse) -->
  <ellipse cx="400" cy="225" rx="170" ry="95" fill="#2a1810" stroke="#f97316" stroke-width="2" stroke-opacity="0.6"/>
  <ellipse cx="400" cy="225" rx="155" ry="82" fill="none" stroke="#f97316" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Center candle -->
  <g>
    <rect x="394" y="215" width="12" height="24" rx="2" fill="#f97316" opacity="0.7"/>
    <ellipse cx="400" cy="210" rx="5" ry="8" fill="#ffdd55">
      <animate attributeName="ry" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Place settings: 4 plates + wine glasses -->
  <g>
    <!-- N -->
    <circle cx="400" cy="150" r="22" fill="none" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.8"/>
    <circle cx="400" cy="150" r="15" fill="none" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
    <!-- E -->
    <circle cx="530" cy="225" r="22" fill="none" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.8"/>
    <circle cx="530" cy="225" r="15" fill="none" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
    <!-- S -->
    <circle cx="400" cy="300" r="22" fill="none" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.8"/>
    <circle cx="400" cy="300" r="15" fill="none" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
    <!-- W -->
    <circle cx="270" cy="225" r="22" fill="none" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.8"/>
    <circle cx="270" cy="225" r="15" fill="none" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- Wine glasses next to plates (small circles — top-down view) -->
  <g fill="#f97316" opacity="0.55">
    <circle cx="430" cy="130" r="6">
      <animate attributeName="opacity" values="0.55;0.9;0.55" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="195" r="6">
      <animate attributeName="opacity" values="0.55;0.9;0.55" dur="2.2s" begin="0.55s" repeatCount="indefinite"/>
    </circle>
    <circle cx="370" cy="320" r="6">
      <animate attributeName="opacity" values="0.55;0.9;0.55" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="255" r="6">
      <animate attributeName="opacity" values="0.55;0.9;0.55" dur="2.2s" begin="1.65s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Chat bubbles rising -->
  <g font-family="monospace" font-size="10" fill="#f97316">
    <g opacity="0">
      <rect x="170" y="80" width="80" height="22" rx="11" fill="#f97316" opacity="0.2"/>
      <text x="210" y="95" text-anchor="middle" opacity="0.9">cheers!</text>
      <animate attributeName="opacity" values="0;1;0" dur="3s" keyTimes="0;0.4;1" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,20;0,-10;0,-20" dur="3s" keyTimes="0;0.5;1" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <rect x="550" y="85" width="80" height="22" rx="11" fill="#f97316" opacity="0.2"/>
      <text x="590" y="100" text-anchor="middle" opacity="0.9">party!</text>
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1s" keyTimes="0;0.4;1" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,20;0,-10;0,-20" dur="3s" begin="1s" keyTimes="0;0.5;1" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <rect x="360" y="60" width="80" height="22" rx="11" fill="#f97316" opacity="0.2"/>
      <text x="400" y="75" text-anchor="middle" opacity="0.9">rsvp yes</text>
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="2s" keyTimes="0;0.4;1" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,20;0,-10;0,-20" dur="3s" begin="2s" keyTimes="0;0.5;1" repeatCount="indefinite"/>
    </g>
  </g>

  <text x="400" y="420" fill="#f97316" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.4">HOSTR</text>
</svg>
