<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="100%" style="stop-color:#07080c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#6366f188"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366f115" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Grid overlay -->
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Decorative elements -->
  <circle cx="640" cy="135" r="120" fill="#6366f108"/>
  <circle cx="160" cy="315" r="80" fill="#6366f105"/>
  
  <!-- Center accent -->
  <rect x="340" y="185" width="120" height="80" rx="4" fill="none" stroke="#6366f140" stroke-width="1"/>
  
  <!-- Label -->
  <text x="400" y="233" 
        font-family="monospace" 
        font-size="18" 
        font-weight="500"
        fill="#6366f1" 
        text-anchor="middle"
        filter="url(#glow)"
        letter-spacing="4">REFLEKT</text>
  
  <!-- Corner accents -->
  <path d="M 20 20 L 60 20 M 20 20 L 20 60" stroke="#6366f160" stroke-width="2" fill="none"/>
  <path d="M 780 430 L 740 430 M 780 430 L 780 390" stroke="#6366f160" stroke-width="2" fill="none"/>
</svg>