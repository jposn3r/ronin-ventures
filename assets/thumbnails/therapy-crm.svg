<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="tcBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#tcBg)"/>

  <!-- Calendar card -->
  <g transform="translate(140 60)">
    <rect x="0" y="0" width="520" height="320" rx="10" fill="#141414" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- Header -->
    <rect x="0" y="0" width="520" height="44" rx="10" fill="#a78bfa" opacity="0.12"/>
    <text x="24" y="28" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="600" letter-spacing="2">APRIL 2026</text>
    <g stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.6">
      <polyline points="440,16 432,24 440,32"/>
      <polyline points="476,16 484,24 476,32"/>
    </g>

    <!-- Day-of-week header -->
    <g font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.55" text-anchor="middle" letter-spacing="1">
      <text x="70"  y="66">MON</text>
      <text x="140" y="66">TUE</text>
      <text x="210" y="66">WED</text>
      <text x="280" y="66">THU</text>
      <text x="350" y="66">FRI</text>
      <text x="420" y="66">SAT</text>
      <text x="490" y="66">SUN</text>
    </g>

    <!-- Grid cells -->
    <g>
      <!-- Row 1 -->
      <rect x="40"  y="80" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="110" y="80" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="180" y="80" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="250" y="80" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="320" y="80" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="390" y="80" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="460" y="80" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <!-- Row 2 -->
      <rect x="40"  y="140" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="110" y="140" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="180" y="140" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="250" y="140" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="320" y="140" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="390" y="140" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="460" y="140" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <!-- Row 3 -->
      <rect x="40"  y="200" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="110" y="200" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="180" y="200" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="250" y="200" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="320" y="200" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="390" y="200" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="460" y="200" width="60" height="50" rx="4" fill="#a78bfa" opacity="0.05"/>
      <!-- Row 4 -->
      <rect x="40"  y="260" width="60" height="40" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="110" y="260" width="60" height="40" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="180" y="260" width="60" height="40" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="250" y="260" width="60" height="40" rx="4" fill="#a78bfa" opacity="0.05"/>
      <rect x="320" y="260" width="60" height="40" rx="4" fill="#a78bfa" opacity="0.05"/>
    </g>

    <!-- Appointment pills appearing in sequence -->
    <g>
      <rect x="114" y="150" width="52" height="14" rx="3" fill="#a78bfa" opacity="0">
        <animate attributeName="opacity" values="0;0.85;0.85;0" dur="6s" keyTimes="0;0.1;0.95;1" repeatCount="indefinite"/>
      </rect>
      <rect x="254" y="90" width="52" height="14" rx="3" fill="#a78bfa" opacity="0">
        <animate attributeName="opacity" values="0;0.85;0.85;0" dur="6s" keyTimes="0;0.2;0.95;1" repeatCount="indefinite"/>
      </rect>
      <rect x="394" y="150" width="52" height="14" rx="3" fill="#a78bfa" opacity="0">
        <animate attributeName="opacity" values="0;0.85;0.85;0" dur="6s" keyTimes="0;0.3;0.95;1" repeatCount="indefinite"/>
      </rect>
      <rect x="44" y="210" width="52" height="14" rx="3" fill="#a78bfa" opacity="0">
        <animate attributeName="opacity" values="0;0.85;0.85;0" dur="6s" keyTimes="0;0.4;0.95;1" repeatCount="indefinite"/>
      </rect>
      <rect x="184" y="210" width="52" height="14" rx="3" fill="#a78bfa" opacity="0">
        <animate attributeName="opacity" values="0;0.85;0.85;0" dur="6s" keyTimes="0;0.5;0.95;1" repeatCount="indefinite"/>
      </rect>
      <rect x="324" y="150" width="52" height="14" rx="3" fill="#a78bfa" opacity="0">
        <animate attributeName="opacity" values="0;0.85;0.85;0" dur="6s" keyTimes="0;0.6;0.95;1" repeatCount="indefinite"/>
      </rect>
      <rect x="114" y="268" width="52" height="14" rx="3" fill="#a78bfa" opacity="0">
        <animate attributeName="opacity" values="0;0.85;0.85;0" dur="6s" keyTimes="0;0.7;0.95;1" repeatCount="indefinite"/>
      </rect>
      <rect x="254" y="210" width="52" height="14" rx="3" fill="#a78bfa" opacity="0">
        <animate attributeName="opacity" values="0;0.85;0.85;0" dur="6s" keyTimes="0;0.8;0.95;1" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Today highlight -->
    <rect x="252" y="142" width="56" height="46" rx="6" fill="none" stroke="#a78bfa" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="400" y="420" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.4">THERAPY CRM</text>
</svg>
