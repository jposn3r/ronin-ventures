<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="mlbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#180808"/>
      <stop offset="100%" stop-color="#0a0303"/>
    </linearGradient>
    <radialGradient id="mlbField" cx="0.5" cy="0.85" r="0.7">
      <stop offset="0%" stop-color="#e63946" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#mlbBg)"/>

  <!-- Subtle field glow -->
  <rect width="800" height="450" fill="url(#mlbField)"/>

  <!-- Crowd arc in outfield -->
  <g fill="#e63946" opacity="0.55">
    <circle cx="150" cy="108" r="3"><animate attributeName="cy" values="108;105;108" dur="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="190" cy="95"  r="3"><animate attributeName="cy" values="95;91;95"    dur="1.1s" begin="0.15s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="84"  r="3"><animate attributeName="cy" values="84;80;84"    dur="1.4s" begin="0.3s"  repeatCount="indefinite"/></circle>
    <circle cx="270" cy="75"  r="3"><animate attributeName="cy" values="75;71;75"    dur="1.2s" begin="0.45s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="68"  r="3"><animate attributeName="cy" values="68;64;68"    dur="1.5s" begin="0.6s"  repeatCount="indefinite"/></circle>
    <circle cx="350" cy="64"  r="3"><animate attributeName="cy" values="64;60;64"    dur="1.25s" begin="0.1s"  repeatCount="indefinite"/></circle>
    <circle cx="390" cy="62"  r="3"><animate attributeName="cy" values="62;58;62"    dur="1.35s" begin="0.55s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="62"  r="3"><animate attributeName="cy" values="62;58;62"    dur="1.15s" begin="0.2s"  repeatCount="indefinite"/></circle>
    <circle cx="470" cy="64"  r="3"><animate attributeName="cy" values="64;60;64"    dur="1.4s"  begin="0.35s" repeatCount="indefinite"/></circle>
    <circle cx="510" cy="68"  r="3"><animate attributeName="cy" values="68;64;68"    dur="1.2s"  begin="0.5s"  repeatCount="indefinite"/></circle>
    <circle cx="550" cy="75"  r="3"><animate attributeName="cy" values="75;71;75"    dur="1.3s"  begin="0.05s" repeatCount="indefinite"/></circle>
    <circle cx="590" cy="84"  r="3"><animate attributeName="cy" values="84;80;84"    dur="1.5s"  begin="0.4s"  repeatCount="indefinite"/></circle>
    <circle cx="630" cy="95"  r="3"><animate attributeName="cy" values="95;91;95"    dur="1.2s"  begin="0.25s" repeatCount="indefinite"/></circle>
    <circle cx="670" cy="108" r="3"><animate attributeName="cy" values="108;105;108" dur="1.35s" begin="0.5s"  repeatCount="indefinite"/></circle>
  </g>

  <!-- Outfield arc (subtle) -->
  <path d="M 250,300 Q 400,80 550,300" fill="none" stroke="#e63946" stroke-width="1" stroke-opacity="0.22"/>
  <path d="M 210,315 Q 400,40 590,315" fill="none" stroke="#e63946" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Infield diamond -->
  <g transform="translate(400 230)">
    <!-- Infield fill -->
    <polygon points="0,100 100,0 0,-100 -100,0" fill="#e63946" fill-opacity="0.06" stroke="#e63946" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- Pitcher's mound -->
    <circle r="6" fill="#e63946" fill-opacity="0.5" stroke="#e63946" stroke-opacity="0.7" stroke-width="1"/>

    <!-- Bases (rotated squares) -->
    <g fill="#ffffff" fill-opacity="0.85">
      <rect x="-6" y="94"  width="12" height="12" transform="rotate(45 0 100)"/>
      <rect x="94" y="-6"  width="12" height="12" transform="rotate(45 100 0)"/>
      <rect x="-6" y="-106" width="12" height="12" transform="rotate(45 0 -100)"/>
      <rect x="-106" y="-6" width="12" height="12" transform="rotate(45 -100 0)"/>
    </g>
  </g>

  <!-- Card running the bases -->
  <g>
    <g transform="translate(400 330)">
      <rect x="-9" y="-12" width="18" height="24" rx="2" fill="#e63946" stroke="#ffffff" stroke-width="1.2"/>
      <rect x="-6" y="-9"  width="12" height="6"  rx="1" fill="#ffffff" opacity="0.7"/>
      <rect x="-6" y="-1"  width="12" height="1.5" fill="#ffffff" opacity="0.5"/>
      <rect x="-6" y="3"   width="9"  height="1.5" fill="#ffffff" opacity="0.5"/>
      <rect x="-6" y="7"   width="10" height="1.5" fill="#ffffff" opacity="0.5"/>
    </g>
    <animateMotion dur="16s" repeatCount="indefinite" rotate="0"
      path="M 0,0 L 100,-100 L 0,-200 L -100,-100 Z"
      calcMode="spline"
      keyTimes="0;0.25;0.5;0.75;1"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
  </g>

  <!-- Dust puff at current base -->
  <g>
    <circle r="0" fill="#ffffff" opacity="0">
      <animate attributeName="r" values="0;10;0;0;10;0;0;10;0;0;10;0;0" keyTimes="0;0.03;0.06;0.25;0.28;0.31;0.5;0.53;0.56;0.75;0.78;0.81;1" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.35;0;0;0.35;0;0;0.35;0;0;0.35;0;0" keyTimes="0;0.03;0.06;0.25;0.28;0.31;0.5;0.53;0.56;0.75;0.78;0.81;1" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="400;500;400;300;400" keyTimes="0;0.25;0.5;0.75;1" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="330;230;130;230;330" keyTimes="0;0.25;0.5;0.75;1" dur="16s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="400" y="420" fill="#e63946" font-family="monospace" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="3" opacity="0.5">MLB SHOWDOWN</text>
</svg>
