<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Brickbreaker | Ronin Ventures</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #07080c;
            color: #e8eaed;
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00d4aa, #0099cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        canvas {
            border: 1px solid rgba(0, 212, 170, 0.3);
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.1);
        }
        
        .instructions {
            margin-top: 1rem;
            color: #4a5060;
            font-size: 0.8rem;
        }
        
        .score {
            margin-top: 1rem;
            font-size: 1.2rem;
            color: #00d4aa;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Neon Brickbreaker</h1>
        <canvas id="game" width="480" height="320"></canvas>
        <div class="score">Score: <span id="score">0</span></div>
        <p class="instructions">Use ← → arrow keys or mouse to move the paddle</p>
    </div>
    
    <!-- Back to Hub Button - just include this one script -->
    <script src="/components/back-to-hub.js"></script>
    
    <script>
        // Simple Brickbreaker game implementation
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        // Game state
        let score = 0;
        let ballX = canvas.width / 2;
        let ballY = canvas.height - 30;
        let ballDX = 3;
        let ballDY = -3;
        const ballRadius = 8;
        
        const paddleHeight = 12;
        const paddleWidth = 80;
        let paddleX = (canvas.width - paddleWidth) / 2;
        
        const brickRowCount = 4;
        const brickColumnCount = 8;
        const brickWidth = 50;
        const brickHeight = 16;
        const brickPadding = 6;
        const brickOffsetTop = 40;
        const brickOffsetLeft = 17;
        
        const bricks = [];
        const colors = ['#00d4aa', '#0099cc', '#6366f1', '#f0a030'];
        
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }
        
        let rightPressed = false;
        let leftPressed = false;
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = true;
            if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = false;
            if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = false;
        });
        
        document.addEventListener('mousemove', (e) => {
            const relativeX = e.clientX - canvas.getBoundingClientRect().left;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        });
        
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (ballX > b.x && ballX < b.x + brickWidth && 
                            ballY > b.y && ballY < b.y + brickHeight) {
                            ballDY = -ballDY;
                            b.status = 0;
                            score += 10;
                            scoreEl.textContent = score;
                        }
                    }
                }
            }
        }
        
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#00d4aa';
            ctx.shadowColor = '#00d4aa';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.closePath();
        }
        
        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight, 4);
            ctx.fillStyle = '#0099cc';
            ctx.shadowColor = '#0099cc';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.closePath();
        }
        
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickWidth, brickHeight, 3);
                        ctx.fillStyle = colors[r];
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();
            
            // Ball collision with walls
            if (ballX + ballDX > canvas.width - ballRadius || ballX + ballDX < ballRadius) {
                ballDX = -ballDX;
            }
            if (ballY + ballDY < ballRadius) {
                ballDY = -ballDY;
            } else if (ballY + ballDY > canvas.height - ballRadius) {
                if (ballX > paddleX && ballX < paddleX + paddleWidth) {
                    ballDY = -ballDY;
                    // Add angle based on where ball hits paddle
                    const hitPoint = (ballX - paddleX) / paddleWidth;
                    ballDX = 6 * (hitPoint - 0.5);
                } else {
                    // Reset ball
                    ballX = canvas.width / 2;
                    ballY = canvas.height - 30;
                    ballDX = 3;
                    ballDY = -3;
                }
            }
            
            // Move paddle
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 7;
            }
            
            ballX += ballDX;
            ballY += ballDY;
            
            requestAnimationFrame(draw);
        }
        
        draw();
    </script>
</body>
</html>
